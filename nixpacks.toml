[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.sqlite3", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.openssl", "php83Extensions.curl", "php83Extensions.fileinfo", "nodejs", "nodePackages.npm"]
[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
